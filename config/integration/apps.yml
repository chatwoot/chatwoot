leadsquared:
  id: leadsquared
  feature_flag: crm_integration
  logo: leadsquared.png
  i18n_key: leadsquared
  action: /leadsquared
  hook_type: account
  allow_multiple_hooks: false
  settings_json_schema:
    {
      'type': 'object',
      'properties':
        {
          'access_key': { 'type': 'string' },
          'secret_key': { 'type': 'string' },
          'endpoint_url': { 'type': 'string' },
          'app_url': { 'type': 'string' },
          'timezone': { 'type': 'string' },
          'enable_conversation_activity': { 'type': 'boolean' },
          'enable_transcript_activity': { 'type': 'boolean' },
          'conversation_activity_score': { 'type': 'string' },
          'transcript_activity_score': { 'type': 'string' },
          'conversation_activity_code': { 'type': 'integer' },
          'transcript_activity_code': { 'type': 'integer' },
        },
      'required': ['access_key', 'secret_key'],
      'additionalProperties': true,
    }
  settings_form_schema:
    [
      {
        'label': 'Access Key',
        'type': 'text',
        'name': 'access_key',
        'validation': 'required',
      },
      {
        'label': 'Secret Key',
        'type': 'text',
        'name': 'secret_key',
        'validation': 'required',
      },
      {
        'label': 'Push Conversation Activity',
        'type': 'checkbox',
        'name': 'enable_conversation_activity',
        'help': 'Enable this option to push an activity when a conversation is created',
      },
      {
        'label': 'Conversation Activity Score',
        'type': 'number',
        'name': 'conversation_activity_score',
        'help': 'Score to assign to the conversation created activity, default is 0',
      },
      {
        'label': 'Push Transcript Activity',
        'type': 'checkbox',
        'name': 'enable_transcript_activity',
        'help': 'Enable this option to push an activity when a transcript is created',
      },
      {
        'label': 'Transcript Activity Score',
        'type': 'number',
        'name': 'transcript_activity_score',
        'help': 'Score to assign to the conversation transcript activity, default is 0',
      },
    ]
  visible_properties:
    [
      'access_key',
      'endpoint_url',
      'enable_conversation_activity',
      'enable_transcript_activity',
      'conversation_activity_score',
      'transcript_activity_score',
    ]

zoho:
  id: zoho
  feature_flag: crm_integration
  logo: zoho.png
  i18n_key: zoho
  action: /zoho
  hook_type: account
  allow_multiple_hooks: false
  settings_json_schema:
    {
      'type': 'object',
      'properties':
        {
          'client_id': { 'type': 'string' },
          'client_secret': { 'type': 'string' },
          'soid': { 'type': 'string' },
          'access_token': { 'type': 'string' },
          'refresh_token': { 'type': 'string' },
          'token_expires_at': { 'type': 'string' },
          'api_domain': { 'type': 'string' },
          'token_type': { 'type': 'string' },
          'expires_in': { 'type': ['integer', 'string'] },
          'triggers': { 'type': 'object' },
          'desk_soid': { 'type': 'string' },
          'desk_department_id': { 'type': 'string' },
          'scopes': { 'type': 'array' },
        },
      'required': ['client_id', 'client_secret', 'soid'],
      'additionalProperties': true,
    }
  settings_form_schema:
    [
      {
        'label': 'Client ID',
        'type': 'text',
        'name': 'client_id',
        'validation': 'required',
        'placeholder': '1000.XXXXXXXXXXXXX',
        'help': 'Your Zoho CRM Client ID (Self Client)',
      },
      {
        'label': 'Client Secret',
        'type': 'text',
        'name': 'client_secret',
        'validation': 'required',
        'inputType': 'password',
        'help': 'Your Zoho CRM Client Secret',
      },
      {
        'label': 'Organization ID (SOID)',
        'type': 'text',
        'name': 'soid',
        'validation': 'required',
        'placeholder': '123456789',
        'help': 'Your Zoho CRM Organization ID',
      },
    ]
  visible_properties: ['client_id', 'soid']

