      name: 'ड्यासबोर्ड एपहरू'
      description: 'ड्यासबोर्ड एप्सले तपाईंलाई प्रयोगकर्ता जानकारी, अर्डर, वा भुक्तानी इतिहास देखाउने एपहरू बनाउन र राख्न मद्दत गर्छ, जसले ग्राहक समर्थन टोलीलाई थप सन्दर्भ दिन्छ।.'
    dyte:
      name: 'Dyte'
      short_description: 'Chatwoot बाट ग्राहकसँग सिधै भिडियो वा आवाज कल सुरु गर्नुहोस्।.'
      description: 'Dyte एउटा उत्पादन हो जसले तपाईंको एपमा अडियो र भिडियो सुविधा थप्छ। यस एकीकरणबाट, तपाईंका एजेन्टहरूले Chatwoot बाटै ग्राहकहरूसँग भिडियो/भ्वाइस कल सुरु गर्न सक्छन्।.'
      meeting_name: '%{agent_name} ले बैठक सुरु गरेका छन्'
    slack:
      name: 'Slack'
      short_description: 'Slack मा सिधै सूचना प्राप्त गर्नुहोस् र कुराकानीमा जवाफ दिनुहोस्।.'
      description: "Chatwoot लाई Slack सँग जोड्नुहोस् ताकि तपाईंको टोली सँगसँगै रहोस्। यस एकीकरणले नयाँ कुराकानीको सूचना Slack मा प्राप्त गर्न र जवाफ दिन सकिन्छ।."
    webhooks:
      name: 'Webhooks'
      description: 'Webhook घटनाले तपाईंको Chatwoot खातामा गतिविधिको वास्तविक समय अपडेट दिन्छ। तपाईं रोजेका घटनामा सदस्यता लिन सक्नुहुन्छ, अनि Chatwoot ले HTTP कलब्याकमार्फत अपडेट पठाउनेछ।.'
    dialogflow:
      name: 'Dialogflow'
      short_description: 'एजेन्टलाई पठाउनु अघि प्रारम्भिक प्रश्नहरू समाधान गर्न च्याटबोट बनाउनुहोस्।.'
      description: 'Dialogflow सँग च्याटबोट बनाउनुहोस् र सजिलै तपाईंको पत्रपेटिकामा जोड्नुहोस्। यी बोटहरूले सुरुका प्रश्नहरू सम्हाल्छन् र पछि ग्राहक सेवा एजेन्टलाई पठाउँछन्।.'
    google_translate:
      name: 'Google Translate'
      short_description: 'एजेन्टका लागि ग्राहक सन्देशहरू स्वचालित रूपमा अनुवाद गर्नुहोस्।.'
      description: "Google Translate जोड्नुहोस् जसले एजेन्टलाई ग्राहक सन्देश सजिलै अनुवाद गर्न सहयोग गर्छ। यो एकीकरणले भाषा पहिचान गरेर एजेन्ट वा प्रशासकको रोजाइको भाषामा रूपान्तरण गर्छ।."
    openai:
      name: 'OpenAI'
      short_description: 'AI-सञ्चालित जवाफ सुझाव, सारांश र सन्देश सुधार।.'
      description: 'OpenAI बाट ठूलो भाषा मोडेलको शक्ति प्रयोग गर्नुहोस्, जसमा जवाफ सुझाव, सारांश, सन्देश पुनर्लेखन, वर्तनी जाँच, र लेबल वर्गीकरण सुविधा छन्।.'
    linear:
      name: 'Linear'
      short_description: 'कुराकानीबाट सिधै Linear मुद्दा सिर्जना र लिंक गर्नुहोस्।.'
      description: 'तपाईंको कुराकानी विन्डोबाट सिधै Linear मा मुद्दा सिर्जना गर्नुहोस्। वैकल्पिक रूपमा, अझ सहज र प्रभावकारी ट्र्याकिङका लागि अवस्थित Linear मुद्दा जोड्नुहोस्।.'
    notion:
      name: 'Notion'
      short_description: 'डेटाबेस, कागजात र पृष्ठहरू सिधै Captain सँग एकीकृत गर्नुहोस्।.'
      description: 'आफ्नो Notion कार्यक्षेत्र जडान गर्नुहोस् ताकि Captain ले तपाईंका डेटाबेस, कागजात र पृष्ठबाट सामग्री प्रयोग गरी बौद्धिक जवाफहरू तयार पार्न र थप सान्दर्भिक ग्राहक सहायता दिन सकोस्।.'
    shopify:
      name: 'Shopify'
      short_description: 'आफ्नो Shopify स्टोरबाट अर्डर विवरण तथा ग्राहक जानकारी पहुँच गर्नुहोस्।.'
      description: 'तपाईंको Shopify स्टोर जडान गर्नुहोस् ताकि अर्डर विवरण, ग्राहक जानकारी, र उत्पादन डेटा सिधै कुराकानीमा पहुँच गर्न सक्नुहोस् र तपाईंको समर्थन टोलीलाई छिटो तथा सान्दर्भिक सहायता दिन सकियोस्।.'
    leadsquared:
      name: 'LeadSquared'
      short_description: 'तपाईंका सम्पर्क र कुराकानीहरू LeadSquared CRM सँग मिलाउनुहोस्।.'
      description: 'तपाईंका सम्पर्क र कुराकानीहरू LeadSquared CRM सँग मिलाउनुहोस्। नयाँ सम्पर्क थप्दा यो एकीकरणले स्वचालित रूपमा LeadSquared मा लिड सिर्जना गर्छ र कुराकानी गतिविधि लग गर्छ, जसले तपाईंको बिक्री टोलीलाई पूर्ण सन्दर्भ दिन्छ।.'
