zh_TW:
  secure_password:
    character:
      one: 特點
      other: 人物
    types:
      uppercase: 大寫
      downcase: 小寫
      lowercase: 小寫
      number: 數位
      special: 特別的
    password_has_required_content:
      errors:
        messages:
          unknown_characters: 包含 %{count} 無效 %{subject}
          minimum_characters: 必須至少包含 %{count} %{type} %{subject}
          maximum_characters: 必須包含小於 %{count} %{type} %{subject}
          minimum_length: 必須至少包含 %{count} %{subject}
          maximum_length: 必須包含小於 %{count} %{subject}
    password_disallows_frequent_reuse:
      errors:
        messages:
          password_is_recent: 最後 %{count} 密碼不得重複使用
    password_disallows_frequent_changes:
      errors:
        messages:
          password_is_recent: 每個 %{timeframe} 不能多次更改密碼
    password_requires_regular_updates:
      alerts:
        messages:
          password_updated: 您的密碼已更新。
      errors:
        messages:
          password_expired: 您的密碼已過期。密碼必須每隔 %{timeframe} 更改一次
    datetime:
      precise_distance_in_words:
        half_a_minute: 半分鐘
        less_than_x_seconds:
          one: 1秒
          other: '%{count} 秒'
        x_seconds:
          one: 1秒
          other: '%{count} 秒'
        less_than_x_minutes:
          one: 一分鐘
          other: '%{count} 分鐘'
        x_minutes:
          one: 1分鐘
          other: '%{count} 分鐘'
        about_x_hours:
          one: 1小時
          other: '%{count} 小時'
        x_days:
          one: 1天
          other: '%{count} 天'
        about_x_months:
          one: 1個月
          other: '%{count} 個月'
        x_months:
          one: 1個月
          other: '%{count} 個月'
        about_x_years:
          one: 1年
          other: '%{count} 年'
        over_x_years:
          one: 1年
          other: '%{count} 年'
        almost_x_years:
          one: 1年
          other: '%{count} 年'
