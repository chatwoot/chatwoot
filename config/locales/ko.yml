      description: 'Notion 워크스페이스를 연결하여 Captain이 데이터베이스, 문서 및 페이지의 콘텐츠를 사용하여 지능적인 응답을 생성하고 더 맥락에 맞는 고객 지원을 제공할 수 있도록 합니다.'
