# TODO: Move this values to features.yml itself
# No need to replicate the same values in two places

# ------- Premium Features ------- #
saml:
  name: 'SAML SSO'
  description: 'Configuração para controlar disponibilidade de Single Sign-On SAML'
  enabled: <%= ChatwootApp.enterprise? %>
  icon: 'icon-lock-line'
  config_key: 'saml'
  enterprise: true
custom_branding:
  name: 'Custom Branding'
  description: 'Aplica a sua própria marca a esta instalação do produto.'
  enabled: <%= (ChatwootHub.pricing_plan != 'community') %>
  icon: 'icon-paint-brush-line'
  config_key: 'custom_branding'
  enterprise: true
agent_capacity:
  name: 'Agent Capacity'
  description: 'Define limites limitando auto atribuições de mensagens aos agentes.'
  enabled: <%= (ChatwootHub.pricing_plan != 'community') %>
  icon: 'icon-hourglass-line'
  enterprise: true
audit_logs:
  name: 'Audit Logs'
  description: 'Acompanhe as atividades da conta facilmente com logs de auditoria detalhados.'
  enabled: <%= (ChatwootHub.pricing_plan != 'community') %>
  icon: 'icon-menu-search-line'
  enterprise: true
disable_branding:
  name: 'Disable Branding'
  description: 'Desativa a marca em widgets do site e envios de e-mail.'
  enabled: <%= (ChatwootHub.pricing_plan != 'community') %>
  icon: 'icon-sailbot-fill'
  enterprise: true

# ------- Product Features ------- #
help_center:
  name: 'Help Center'
  description: 'Permite a agentes a criarem artigos na central de ajuda e publica-los no site.'
  enabled: true
  icon: 'icon-book-2-line'
captain:
  name: 'Captain'
  description: 'Atenda clientes usando IA (Inteligência Artificial).'
  enabled: true
  icon: 'icon-captain'
  config_key: 'captain'

# ------- Communication Channels ------- #
live_chat:
  name: 'Live Chat'
  description: 'Melhore a experiência do seu cliente em seu site usando o Chat Ao Vivo.'
  enabled: true
  icon: 'icon-chat-smile-3-line'
email:
  name: 'Email'
  description: 'Gerencie atendimentos e respostas recebidas por e-mail.'
  enabled: true
  icon: 'icon-mail-send-fill'
  config_key: 'email'
sms:
  name: 'SMS'
  description: 'Lide com interações e mensagens de SMS enviadas pelos clientes.'
  enabled: true
  icon: 'icon-message-line'
messenger:
  name: 'Messenger'
  description: 'Mantenha todos conectados pelo Facebook e Instagram via Inbox.'
  enabled: true
  icon: 'icon-messenger-line'
  config_key: 'facebook'
instagram:
  name: 'Instagram'
  description: 'Esteja conectado com seu público diretamente via Instagram.'
  enabled: true
  icon: 'icon-instagram'
  config_key: 'instagram'
tiktok:
  name: 'TikTok'
  description: 'Mantenha os clientes conectados através do seu canal do TikTok.'
  enabled: true
  icon: 'icon-tiktok'
  config_key: 'tiktok'
whatsapp:
  name: 'WhatsApp'
  description: 'Lide com envios empresariais de interações e mensagens usando o WhatsApp.'
  enabled: true
  icon: 'icon-whatsapp-line'
telegram:
  name: 'Telegram'
  description: 'Integrado conversas de clientes através do Telegram a plataforma.'
  enabled: true
  icon: 'icon-telegram-line'
line:
  name: 'Line'
  description: 'Mantenha interações de clientes pela plataforma da rede Line.'
  enabled: true
  icon: 'icon-line-line'

# ------- OAuth & Authentication ------- #
google:
  name: 'Google'
  description: 'Configuração para configurar a unificação do Google OAuth.'
  enabled: true
  icon: 'icon-google'
  config_key: 'google'
microsoft:
  name: 'Microsoft'
  description: 'Configura o recebimento e acesso de e-mails usando serviços corporativos da Microsoft.'
  enabled: true
  icon: 'icon-microsoft'
  config_key: 'microsoft'

# ------- Third-party Integrations ------- #
linear:
  name: 'Linear'
  description: 'Configuração usada para unir a caixa ao aplicativo do Linear.'
  enabled: true
  icon: 'icon-linear'
  config_key: 'linear'
notion:
  name: 'Notion'
  description: 'Configuração usada para gerenciar sua interação e bancos com o Notion.'
  enabled: true
  icon: 'icon-notion'
  config_key: 'notion'
slack:
  name: 'Slack'
  description: 'Configura a ferramenta conectada ao canal corporativo do Slack.'
  enabled: true
  icon: 'icon-slack'
  config_key: 'slack'
whatsapp_embedded:
  name: 'WhatsApp Embedded'
  description: 'Configuração para instalar seu WhatsApp Web intergrado à tela (Cloud).'
  enabled: true
  icon: 'icon-whatsapp-line'
  config_key: 'whatsapp_embedded'
shopify:
  name: 'Shopify'
  description: 'Usado na junção da loja virtual a caixa da Shopify para controle integrado.'
  enabled: true
  icon: 'icon-shopify'
  config_key: 'shopify'
