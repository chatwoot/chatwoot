# Plantilla de Secret. Reemplaza los valores en base64 por los reales.
# Generar base64: echo -n "tu-valor" | base64
#
# NO subas este archivo con valores reales al repositorio.
# En CI/CD usa sealed-secrets, external-secrets o variables de entorno.
---
apiVersion: v1
kind: Secret
metadata:
  name: chatwoot-secret
  namespace: chatwoot
  labels:
    app.kubernetes.io/name: chatwoot
type: Opaque
stringData:
  # Clave de Rails (generar: bundle exec rake secret)
  SECRET_KEY_BASE: "REEMPLAZAR_con_salida_de_rake_secret"

  # PostgreSQL (debe coincidir con postgres-statefulset.yaml)
  POSTGRES_USERNAME: "chatwoot_prod"
  POSTGRES_PASSWORD: "REEMPLAZAR_contrasena_postgres"

  # Redis
  REDIS_PASSWORD: "REEMPLAZAR_contrasena_redis"
  # REDIS_URL se puede construir en el deployment: redis://:$(REDIS_PASSWORD)@redis:6379
  # o definir aquí si prefieres: redis://:REEMPLAZAR_contrasena_redis@redis:6379
  REDIS_URL: "redis://:REEMPLAZAR_contrasena_redis@redis:6379"

  # SMTP
  SMTP_USERNAME: "tu-correo@gmail.com"
  SMTP_PASSWORD: "REEMPLAZAR_app_password_gmail"

  # Encriptación 2FA (generar: bundle exec rails db:encryption:init)
  ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: "REEMPLAZAR"
  ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: "REEMPLAZAR"
  ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: "REEMPLAZAR"
