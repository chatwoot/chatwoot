<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>A alteracao solicitada foi rejeitada (422)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
  body {
    background: linear-gradient(135deg, #003C56 0%, #007298 50%, #008BBA 100%);
    color: #FFFFFF;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 95%;
    max-width: 600px;
    margin: 0 auto;
  }

  .dialog {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 40px 30px;
    box-shadow: 0 8px 32px rgba(0, 60, 86, 0.3);
    margin-bottom: 30px;
  }

  .logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .logo-chatwit {
    width: 200px;
    height: auto;
    filter: brightness(0) invert(1);
  }

  .logo-witdev {
    width: 150px;
    height: auto;
  }

  .powered-by {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    margin: 10px 0;
  }

  h1 {
    font-size: 2.5em;
    color: #FFFFFF;
    margin-bottom: 20px;
    font-weight: 300;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
  }

  .error-code {
    font-size: 6em;
    font-weight: bold;
    color: #008BBA;
    margin: 20px 0;
    text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
  }

  p {
    font-size: 1.2em;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.9);
    margin: 20px 0;
  }

  .info-box {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    padding: 25px;
    margin-top: 20px;
  }

  .back-button {
    display: inline-block;
    padding: 12px 30px;
    background: linear-gradient(45deg, #007298, #008BBA);
    color: white;
    text-decoration: none;
    border-radius: 25px;
    font-weight: 500;
    margin-top: 20px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 139, 186, 0.3);
  }

  .back-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 139, 186, 0.4);
  }

  @media (max-width: 768px) {
    .logos {
      flex-direction: column;
      gap: 15px;
    }
    
    .logo-chatwit {
      width: 150px;
    }
    
    .logo-witdev {
      width: 120px;
    }
    
    .error-code {
      font-size: 4em;
    }
    
    h1 {
      font-size: 2em;
    }
  }
  </style>
</head>

<body>
  <div class="container">
    <div class="logos">
      <img src="/brand-assets/logo.svg" alt="Chatwit" class="logo-chatwit">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="powered-by">Powered by</div>
        <img src="/brand-assets/logo-witdev.png" alt="WitDev" class="logo-witdev">
      </div>
    </div>

    <div class="dialog">
      <div class="error-code">422</div>
      <h1>Alteracao rejeitada</h1>
      <p>A alteracao que voce tentou fazer foi rejeitada pelo sistema.</p>
      <p>Talvez voce nao tenha permissao para realizar esta acao ou os dados fornecidos sejam invalidos.</p>
    </div>
    
    <div class="info-box">
      <p>Se voce e o proprietario da aplicacao, verifique os logs para mais informacoes.</p>
      <a href="/" class="back-button">Voltar ao Inicio</a>
    </div>
  </div>
</body>
</html>
