apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-rails-development
  annotations:
    kubernetes.io/change-cause: "Development deployment"
    container.apparmor.security.beta.kubernetes.io/rails: runtime/default
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: chatwoot-rails-development
  template:
    metadata:
      labels:
        app: chatwoot-rails-development
      annotations:
        timestamp: "0"
    spec:
      containers:
      - name: rails
        image: wavai/chatwoot-rails-dev:v1.0.52
        imagePullPolicy: Always
        command: ["/bin/sh"]
        args: ["-c", "docker/entrypoints/rails.sh && bundle exec rails server -b 0.0.0.0"]
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: chatwoot-config-development
        - secretRef:
            name: chatwoot-secrets-development
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: chatwoot-secrets-development
              key: DATABASE_URL
        - name: VITE_DEV_SERVER_HOST
          value: "chatwoot-vite-development.default.svc.cluster.local"
        - name: VITE_DEV_SERVER_PORT
          value: "3036"
        - name: VITE_RUBY_HOST
          value: "development.cx.aloochat.ai"
        - name: VITE_RUBY_PORT
          value: "443"
        - name: VITE_RUBY_HTTPS
          value: "true"
        - name: NODE_ENV
          value: "production"
        - name: RAILS_ENV
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /healthz
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 180
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-rails-development
spec:
  selector:
    app: chatwoot-rails-development
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
