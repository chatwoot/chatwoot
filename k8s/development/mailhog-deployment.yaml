apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-mailhog-development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-mailhog-development
  template:
    metadata:
      labels:
        app: chatwoot-mailhog-development
    spec:
      containers:
      - name: mailhog
        image: mailhog/mailhog:latest
        ports:
        - containerPort: 1025  # SMTP
        - containerPort: 8025  # Web UI
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-mailhog-development
spec:
  selector:
    app: chatwoot-mailhog-development
  ports:
  - name: smtp
    port: 1025
    targetPort: 1025
  - name: web
    port: 8025
    targetPort: 8025
  type: ClusterIP
