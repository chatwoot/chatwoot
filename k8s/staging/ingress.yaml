apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatwoot-ingress-staging
  namespace: chatwoot-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/use-forwarded-headers: 'true'
    nginx.ingress.kubernetes.io/compute-full-forwarded-for: 'true'
    nginx.ingress.kubernetes.io/enable-real-ip: 'true'
    nginx.ingress.kubernetes.io/real-ip-header: 'X-Forwarded-For'
    nginx.ingress.kubernetes.io/set-real-ip-from: '0.0.0.0/0'
    # WebSocket support for ActionCable
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    nginx.ingress.kubernetes.io/websocket-services: 'chatwoot-rails-staging'
    # Increased body size limits for file uploads
    nginx.ingress.kubernetes.io/proxy-body-size: '100m'
    nginx.ingress.kubernetes.io/client-body-buffer-size: '10m'
spec:
  ingressClassName: nginx-staging
  tls:
    - hosts:
        - staging.cx.aloochat.ai
      secretName: chatwoot-staging-tls
  rules:
    - host: staging.cx.aloochat.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatwoot-rails-staging
                port:
                  number: 3000
