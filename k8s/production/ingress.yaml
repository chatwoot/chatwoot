apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatwoot-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/use-forwarded-headers: 'true'
    nginx.ingress.kubernetes.io/compute-full-forwarded-for: 'true'
    nginx.ingress.kubernetes.io/enable-real-ip: 'true'
    nginx.ingress.kubernetes.io/real-ip-header: 'X-Forwarded-For'
    nginx.ingress.kubernetes.io/set-real-ip-from: '0.0.0.0/0'
    # WebSocket support for ActionCable
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    nginx.ingress.kubernetes.io/websocket-services: 'chatwoot-rails'

    # Increased timeouts for normal requests
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: '300'
    
    # Additional settings to prevent 504 errors for long-running requests
    nginx.ingress.kubernetes.io/proxy-http-version: '1.1'
    # Disable request buffering for faster response start (useful for streaming)
    nginx.ingress.kubernetes.io/proxy-request-buffering: 'off'
    
    # Increased body size limits for file uploads
    nginx.ingress.kubernetes.io/proxy-body-size: '100m'
    nginx.ingress.kubernetes.io/client-body-buffer-size: '10m'
    
    # Proxy buffer settings for large responses
    # Using simpler buffer settings that don't require proxy-busy-buffers-size
    nginx.ingress.kubernetes.io/proxy-buffer-size: '8k'
    nginx.ingress.kubernetes.io/proxy-buffers-number: '4'
    
    # Keep-alive settings
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: '120'
    nginx.ingress.kubernetes.io/upstream-keepalive-requests: '10000'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cx.aloochat.ai
      secretName: chatwoot-tls
  rules:
    - host: cx.aloochat.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatwoot-rails
                port:
                  number: 3000