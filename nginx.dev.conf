events {
    worker_connections 1024;
}

http {
    upstream rails_app {
        server rails:3000;
    }

    upstream assignments_service {
        server chatwoot-virti-custom:5000; 
    }

    upstream app_backend {
        server app.local:5000;
    }

    upstream vite_dev {
        server vite:3036;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 100M;

        # Increase buffer sizes to handle large cookies and headers
        large_client_header_buffers 4 128k;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;

        # Increase timeouts for proxy connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # # Proxy to app service for /api/
        # location /api/ {
        #     proxy_pass http://app_service;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
        #
        # # Proxy to app service for /apiportal/
        # location /apiportal/ {
        #     proxy_pass http://app_service;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # Specific route for assignments endpoint and /acl
        location ~ ^/(api/v1/accounts/[0-9]+/conversations/[0-9]+/assignments|acl|acl/[0-9]+|api/v1/virti/.+)$ {
            # Check if request is coming from assignments service itself
            # If X-Forwarded-From-Assignments header exists, skip proxy and send to Rails
            if ($http_x_forwarded_from_assignments = "true") {
                proxy_pass http://rails_app;
                break;
            }

            # Forward to assignments service and add header to prevent loops
            proxy_pass http://assignments_service;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-From-Assignments "true";
            proxy_redirect off;

            # Add error handling
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # Rails renders tags pointing to /vite-dev/assets/* (manifest-based) in this setup.
        # These files live under Rails /public and should be served by Rails, not the Vite dev server.
        location ^~ /vite-dev/assets/ {
            proxy_pass http://rails_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location = /vite-dev/manifest.json {
            proxy_pass http://rails_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location ^~ /vite-dev/.vite/ {
            proxy_pass http://rails_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /vite-dev/ {
            proxy_pass http://vite_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Vite blocks unknown hosts by default (DNS rebinding protection).
            # Requests proxied from nginx to the docker hostname `vite` would be rejected (403).
            # Force a safe host so the dev server accepts the request.
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Proxy para o backend SDR Virtual (chamadas autenticadas do frontend)
        location /virti-api/ {
            rewrite ^/virti-api/(.*) /$1 break;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # All other requests go to Rails
        location / {
            proxy_pass http://rails_app;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
