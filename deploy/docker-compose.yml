# docker-compose.yml — Chatwoot Pro (with chatwoot_kanban engine baked in)
#
# Builds from your fork's source code (NOT chatwoot/chatwoot:latest), so the
# engines under engines/* are included in the image.
#
# Usage:
#   docker compose build
#   docker compose run --rm rails bundle exec rails db:chatwoot_prepare
#   docker compose up -d
#
# Logs:
#   docker compose logs -f rails sidekiq

services:
  base: &base
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUNDLE_WITHOUT: 'development:test'
        RAILS_ENV: 'production'
    image: chatwoot-pro:latest
    env_file: .env
    volumes:
      - storage_data:/app/storage

  rails:
    <<: *base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api']
      interval: 30s
      timeout: 5s
      retries: 5

  sidekiq:
    <<: *base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE:-chatwoot}
      - POSTGRES_USER=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ['sh', '-c', 'redis-server --requirepass "$$REDIS_PASSWORD"']
    env_file: .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Caddy as reverse proxy with auto-HTTPS via Let's Encrypt.
  # Comment this block out if you want to use nginx-proxy/Traefik externally.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - rails
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  storage_data:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
