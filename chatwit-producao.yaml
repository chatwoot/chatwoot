# -----------------------------------------------------------------------------
# Definição dos Serviços
# -----------------------------------------------------------------------------
services:
  chatwoot_app:
    <<: *chatwoot-base
    entrypoint: /app/docker/entrypoints/rails-enterprise.sh
    command: sh -c "bundle exec rails db:chatwit_smart_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    environment: *chatwoot-environment
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints: [node.role == manager]
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: '6.0'        
          memory: 6000M      
        reservations:
          cpus: '1.0'        
          memory: 2048M      
      labels:
        - "traefik.enable=true"
        - 'traefik.http.routers.chatwoot_app.rule=Host(`chatwit.witdev.com.br`)'
        - "traefik.http.routers.chatwoot_app.entrypoints=websecure"
        - "traefik.http.routers.chatwoot_app.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.chatwoot_app.priority=1"
        - "traefik.http.services.chatwoot_app.loadbalancer.server.port=3000"
        
        # --- STICKY SESSIONS (OBRIGATÓRIO PARA REPLICAS > 1) ---
        - "traefik.http.services.chatwoot_app.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.chatwoot_app.loadbalancer.sticky.cookie.name=chatwoot_lb"
        - "traefik.http.services.chatwoot_app.loadbalancer.sticky.cookie.secure=true"
        - "traefik.http.services.chatwoot_app.loadbalancer.sticky.cookie.httpOnly=true"

        # --- MIDDLEWARES (Headers e Segurança) ---
        - "traefik.http.routers.chatwoot_app.middlewares=chatwoot_headers,chatwoot_ratelimit"
        - "traefik.http.middlewares.chatwoot_ratelimit.ratelimit.average=150"
        - "traefik.http.middlewares.chatwoot_ratelimit.ratelimit.burst=300"
        - "traefik.http.middlewares.chatwoot_headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.chatwoot_headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.chatwoot_headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.chatwoot_headers.headers.browserXssFilter=true"

  chatwoot_sidekiq:
    <<: *chatwoot-base
    command: sh -c "bundle exec sidekiq -C config/sidekiq.yml"
    environment: *chatwoot-environment
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          cpus: '6.0'
          memory: 6000M
        reservations:
          cpus: '1.0'
          memory: 2048M

# -----------------------------------------------------------------------------
# Definições Globais
# -----------------------------------------------------------------------------
volumes:
  chatwoot_data:
    external: true
  chatwoot_public:    
    external: true

networks:
  minha_rede:
    external: true