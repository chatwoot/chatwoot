# #
# # This action will publish Chatwoot CE docker image.
# # Runs on develop, master, and version tags.
# #

name: Publish Chatwoot CE docker images

on:
  push:
    branches:
      - develop
      - master
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GIT_REF: ${{ github.head_ref || github.ref_name }}
      SHORT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Strip enterprise code
        run: |
          rm -rf enterprise
          rm -rf spec/enterprise

      - name: Set Chatwoot edition
        run: |
          echo -e '\nENV CW_EDITION="ce"' >> docker/Dockerfile

      # -----------------------------
      # Docker tags (GC-safe)
      # -----------------------------
      - name: Set docker tags
        run: |
          SHA_TAG="${GIT_REF}-${SHORT_SHA::7}"

          TAGS="registry.314ecorp.tech/chatwoot:${GIT_REF},registry.314ecorp.tech/chatwoot:${SHA_TAG}"

          # If master → also push latest
          if [ "${GIT_REF}" = "master" ]; then
            TAGS="$TAGS,registry.314ecorp.tech/chatwoot:latest"
          fi

          echo "DOCKER_TAGS=$TAGS" >> $GITHUB_ENV

      - name: Login to registry
        uses: docker/login-action@v1
        with:
          registry: registry.314ecorp.tech
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_TAGS }}
