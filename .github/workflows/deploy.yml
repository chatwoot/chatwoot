name: Build and Deploy convertoChat

on:
  push:
    branches:
      - upgrade/v4.10.1
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RAILS_ENV=production
            BUNDLE_WITHOUT=development:test

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/upgrade/v4.10.1' || github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            cd /root

            echo "=== [1/6] Backup do banco ==="
            docker compose exec -T postgres \
              pg_dump -U postgres chatwoot_production \
              > backup_pre_deploy_$(date +%Y%m%d_%H%M%S).sql
            echo "Backup concluido"

            echo "=== [2/6] Pull da nova imagem ==="
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "=== [3/6] Parando containers ==="
            docker compose down

            echo "=== [4/6] Subindo com nova imagem ==="
            docker compose up -d

            echo "=== [5/6] Aguardando Rails iniciar (60s) ==="
            sleep 60

            echo "=== [6/6] Rodando migrations ==="
            docker compose exec -T rails bundle exec rails db:chatwoot_prepare || \
              docker compose exec -T rails bundle exec rails db:migrate

            echo "=== Deploy concluido! ==="

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 http://localhost:3000)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "Health check OK (HTTP $HTTP_CODE)"
              BRAND=$(curl -s --max-time 10 http://localhost:3000 | grep -o 'APP_VERSION":"[^"]*"' || echo "unknown")
              echo "Version: $BRAND"
            else
              echo "Health check FAILED (HTTP $HTTP_CODE)"
              echo "Logs:"
              docker compose logs rails --tail 30
              exit 1
            fi
