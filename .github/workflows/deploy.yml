name: Deploy

on:
  push:
    branches:
      - framky/main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, chatwoot]
    timeout-minutes: 15
    if: github.ref == 'refs/heads/framky/main'

    steps:
      - name: Deploy via script
        run: |
          sudo -u chatwoot bash /srv/chatwoot/chatwoot/deployment/framky/deploy.sh
