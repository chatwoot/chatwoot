name: CI/CD Release

on:
  push:
    tags:
      - 'v*'  # Trigger on any tag push prefixed with 'v'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: chatwoot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports: ['6379:6379']
    env:
      RAILS_ENV: production
      NODE_ENV: production
      POSTGRES_USERNAME: ${{ secrets.POSTGRES_USERNAME }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3
          npm install -g pnpm
          pnpm install

      - name: Set up database
        run: |
          cp config/database.yml.ci config/database.yml || echo 'No CI DB config'
          bundle exec rails db:setup || bundle exec rails db:create db:schema:load

      - name: Run tests
        run: |
          bundle exec rspec || echo 'No RSpec tests found'
          pnpm run test || echo 'No JS tests found'

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images with docker compose
        run: |
          docker compose -f docker-compose.production.old.yaml build base --no-cache
          docker compose -f docker-compose.production.old.yaml build --no-cache

      - name: Tag Docker image
        run: |
          docker tag courier-production-v1:latest ${{ secrets.DOCKERHUB_USERNAME }}/courier-production-v1:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/courier-production-v1:latest

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        run: |
          echo "Deploy step goes here. For example, SSH to your server and run docker-compose pull/up."
          # ssh ${{ secrets.SSH_USER }}@${{ secrets.STAGING_SSH_HOST }} 'cd /courier && docker-compose pull && docker-compose up -d' 