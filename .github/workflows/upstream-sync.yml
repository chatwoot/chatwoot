name: Upstream Sync

on:
  schedule:
    # Runs every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # allow manual trigger

jobs:
  sync:
    name: Sync security patches from chatwoot/chatwoot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/chatwoot/chatwoot.git || true

      - name: Fetch upstream develop
        run: git fetch upstream develop

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/develop --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Commits behind upstream: $BEHIND"

      - name: Create sync branch
        if: steps.check.outputs.behind != '0'
        run: |
          git checkout -b upstream-sync/$(date +%Y-%m-%d)
          git merge upstream/develop --no-edit --strategy-option=ours || true

      - name: Push sync branch and open PR
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="upstream-sync/$(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: upstream sync $(date +%Y-%m-%d)" \
            --body "Automated weekly sync from chatwoot/chatwoot upstream. Review for security patches and breaking changes before merging." \
            --base develop \
            --head "$BRANCH" \
            --label "upstream-sync" || true
