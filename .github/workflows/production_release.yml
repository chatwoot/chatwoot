name: CI/CD Release

on:
  push:
    tags:
      - 'p*'  # Trigger on any tag push prefixed with 'p'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: production
      NODE_ENV: production
      POSTGRES_USERNAME: ${{ secrets.PROD_POSTGRES_USERNAME }}
      POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
      POSTGRES_DATABASE: ${{ secrets.PROD_POSTGRES_DATABASE }}
      REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      PGSSLMODE: ${{ secrets.PROD_PGSSLMODE }}
      SECRET_KEY_BASE: ${{ secrets.PROD_SECRET_KEY_BASE }}
      POSTMARK_API_TOKEN: ${{ secrets.PROD_POSTMARK_API_TOKEN }}
      SOURCE_TOKEN: ${{ secrets.PROD_SOURCE_TOKEN }}
      INGESTING_HOST: ${{ secrets.PROD_INGESTING_HOST }}
      CDN_ACCESS_KEY: ${{ secrets.PROD_CDN_ACCESS_KEY }}
      CDN_ACCESS_SECRET: ${{ secrets.PROD_CDN_ACCESS_SECRET }}
      CDN_REGION: ${{ secrets.PROD_CDN_REGION }}
      CDN_BUCKET: ${{ secrets.PROD_CDN_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagickwand-dev imagemagick

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3
          npm install -g pnpm
          pnpm install

      - name: Precompile assets
        run: |
          RAILS_ENV=production bundle exec rake assets:precompile

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Export secrets to .env file
        run: |
          cat <<EOF > .env
          POSTGRES_USERNAME=${{ secrets.PROD_POSTGRES_USERNAME }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_DATABASE=${{ secrets.PROD_POSTGRES_DATABASE }}
          REDIS_URL=${{ secrets.PROD_REDIS_URL }}
          DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
          PGSSLMODE=${{ secrets.PROD_PGSSLMODE }}
          SECRET_KEY_BASE=${{ secrets.PROD_SECRET_KEY_BASE }}
          POSTMARK_API_TOKEN=${{ secrets.PROD_POSTMARK_API_TOKEN }}
          SOURCE_TOKEN=${{ secrets.PROD_SOURCE_TOKEN }}
          INGESTING_HOST=${{ secrets.PROD_INGESTING_HOST }}
          CDN_ACCESS_KEY=${{ secrets.PROD_CDN_ACCESS_KEY }}
          CDN_ACCESS_SECRET=${{ secrets.PROD_CDN_ACCESS_SECRET }}
          CDN_REGION=${{ secrets.PROD_CDN_REGION }}
          CDN_BUCKET=${{ secrets.PROD_CDN_BUCKET }}
          EOF

      - name: Build Docker images with docker compose
        run: |
          docker compose --env-file .env -f docker-compose.production.old.yaml build base --no-cache
          docker compose --env-file .env -f docker-compose.production.old.yaml build rails sidekiq --no-cache

      - name: Tag Docker image
        run: |
          docker tag courier-production-v1:latest ghcr.io/on-cruise-control/courier:production

      - name: Push Docker image
        run: |
          docker push ghcr.io/on-cruise-control/courier:production

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.PROD_SSH_HOST }} '
            set -e
            cd ../root/courier

            echo "--- Logging into GHCR ---"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            echo "--- Pulling latest Docker images ---"
            docker compose -f docker-compose.production.yaml pull

            echo "--- Starting containers ---"
            docker compose -f docker-compose.production.yaml up -d --pull always

            echo "--- Running database migrations ---"
            docker compose -f docker-compose.production.yaml exec rails bundle exec rails db:migrate
          '
