name: Konko Chatwoot CI

on:
  push:
    branches:
      - master-konko
    tags: ['v*']
  pull_request:
    branches:
      - master-konko

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'app/assets/**'
              - 'app/javascript/**'
              - 'public/**'
              - 'theme/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - '.eslintrc*'
              - 'jest.config.*'
              - 'babel.config.*'
              - 'tsconfig*'
            backend:
              - 'app/**/*.rb'
              - 'config/**'
              - 'db/**'
              - 'lib/**'
              - 'spec/**'
              - 'swagger/**'
              - 'Gemfile'
              - 'Gemfile.lock'
              - '.ruby-version'

  test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' && needs.detect-changes.outputs.backend == 'false'
    uses: ./.github/workflows/frontend-fe.yml

  test-all:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    uses: ./.github/workflows/run_foss_spec.yml

  release-image:
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      (needs.test-all.result == 'success' || needs.test-all.result == 'skipped')
    needs: [test-frontend, test-all]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: konko-ai/chatwoot
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version
        id: semver
        uses: paulhatch/semantic-version@v6.0.1
        with:
          version_format: '${major}.${minor}.${patch}-dev.${increment}'

      - name: Set image tag
        id: image_tag
        run: echo "tag=v${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha,scope=konko-chatwoot-image
          cache-to: type=gha,mode=max,scope=konko-chatwoot-image

  deploy:
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.release-image.result == 'success'
    needs: release-image
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/') && 'Production' || 'Development' }}
    steps:
      - name: Trigger infra deploy workflow
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_TOKEN }}
          IMAGE_TAG: ${{ needs.release-image.outputs.image_tag }}
          ENVIRONMENT: ${{ startsWith(github.ref, 'refs/tags/') && 'prod' || 'dev' }}
        run: |
          gh workflow run chatwoot-deploy.yaml \
            --repo konko-ai/konko-iac \
            --ref main \
            -f environment="$ENVIRONMENT" \
            -f image_tag="$IMAGE_TAG"
