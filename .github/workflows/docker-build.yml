name: Build and Push Chatwoot

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t coidsa/chatwoot:sha-${GITHUB_SHA::7} \
            -t coidsa/chatwoot:latest \
            .
      - name: Push image
        run: |
          docker push coidsa/chatwoot:sha-${GITHUB_SHA::7}
          docker push coidsa/chatwoot:latest
