patch:
  tags:
    - Inboxes
  operationId: updateInbox
  summary: Update Inbox
  security:
    - userApiKey: []
  description: Update an existing inbox
  parameters:
    - $ref: '#/components/parameters/account_id'
    - name: id
      in: path
      schema:
        type: number
      description: ID of the inbox
      required: true
  x-codeSamples:
    - lang: python
      label: "Update an inbox"
      source: |
        from chatwoot import ChatwootClient

        client = ChatwootClient(
            base_url="https://app.chatwoot.com",
            api_token="your-api-token"
        )

        inbox = client.inboxes.update(
            account_id=1,
            inbox_id=5,
            name="Updated Inbox Name",
            enable_auto_assignment=True
        )

        print(inbox.id, inbox.name)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/inbox_update_payload'
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            description: 'Updated inbox object'
            $ref: '#/components/schemas/inbox'
    '404':
      description: Inbox not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/bad_request_error'
    '403':
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/bad_request_error'
