tags:
  - Inboxes
operationId: update-agents-in-inbox
summary: Update Agents in Inbox
description: All agents except the one passed in params will be removed
security:
  - userApiKey: []
x-codeSamples:
  - lang: python
    label: "Replace all agents in inbox"
    source: |
      from chatwoot import ChatwootClient

      client = ChatwootClient(
          base_url="https://app.chatwoot.com",
          api_token="your-api-token"
      )

      # Replaces ALL current agents — agents not in this list are removed
      agents = client.inboxes.agents.update(
          account_id=1,
          inbox_id=5,
          agent_ids=[10, 11]
      )

      print(f"Inbox now has {len(agents)} agents")
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - inbox_id
          - user_ids
        properties:
          inbox_id:
            type: string
            description: The ID of the inbox
            example: 1
          user_ids:
            type: array
            items:
              type: integer
            description: IDs of users to be added to the inbox
            example: [1]
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          type: object
          properties:
            payload:
              type: array
              description: 'Array of all active agents'
              items:
                $ref: '#/components/schemas/agent'
  '404':
    description: Inbox not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '403':
    description: Access denied
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '422':
    description: User must exist
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
