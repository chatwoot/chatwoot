tags:
  - Subscription
operationId: get-checkout-url
summary: Get Checkout URL
description: Get a Stripe checkout URL for subscribing to a plan.
security:
  - userApiKey: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - plan_key
        properties:
          plan_key:
            type: string
            description: The plan identifier to subscribe to
responses:
  '200':
    description: Checkout URL generated
    content:
      application/json:
        schema:
          type: object
          properties:
            checkout_url:
              type: string
  '401':
    description: Unauthorized
  '422':
    description: Invalid plan
