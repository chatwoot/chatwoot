tags:
  - Orders
operationId: cancel-an-order
summary: Cancel Order
description: |
  Cancel an order. Only orders with status `initiated` or `pending` can be cancelled.
  Cancelling restores product stock.
security:
  - userApiKey: []
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/order'
  '401':
    description: Unauthorized
  '404':
    description: Order not found
  '422':
    description: Order cannot be cancelled (already paid, failed, etc.)
    content:
      application/json:
        schema:
          type: object
          properties:
            error:
              type: string
