tags:
  - Order Notes
operationId: list-order-notes
summary: List Order Notes
description: |
  List all notes for a specific order, ordered by most recent first.
security:
  - userApiKey: []
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '#/components/schemas/order_note'
  '401':
    description: Unauthorized
  '404':
    description: Order not found
