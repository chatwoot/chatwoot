tags:
  - Order Notes
operationId: create-an-order-note
summary: Create Order Note
description: |
  Add a note to a specific order. The current authenticated user will be recorded as the note author.
security:
  - userApiKey: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/order_note_create_payload'
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/order_note'
  '401':
    description: Unauthorized
  '404':
    description: Order not found
  '422':
    description: Validation error (e.g., content blank)
