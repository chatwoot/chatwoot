tags:
  - Payzah Settings
operationId: create-payzah-settings
summary: Create Payzah Settings
description: Create Payzah payment gateway settings for the account.
security:
  - userApiKey: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          payzah_settings:
            type: object
            properties:
              api_key:
                type: string
                description: Payzah API key
              enabled:
                type: boolean
responses:
  '200':
    description: Settings created
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/payzah_settings'
  '401':
    description: Unauthorized
  '422':
    description: Validation error
