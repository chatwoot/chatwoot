tags:
  - Payment Links
operationId: cancel-a-payment-link
summary: Cancel Payment Link
description: |
  Cancel a payment link. Only payment links with status `initiated` or `pending` can be cancelled.
security:
  - userApiKey: []
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/payment_link'
  '401':
    description: Unauthorized
  '404':
    description: Payment link not found
  '422':
    description: Payment link cannot be cancelled
    content:
      application/json:
        schema:
          type: object
          properties:
            error:
              type: string
