get:
  tags:
    - Contacts
  operationId: contactableInboxesGet
  description: Get List of contactable Inboxes
  summary: Get Contactable Inboxes
  security:
    - userApiKey: []
  parameters:
    - $ref: '#/components/parameters/account_id'
    - name: id
      in: path
      schema:
        type: number
      description: ID of the contact
      required: true
  x-codeSamples:
    - lang: python
      label: "Get contactable inboxes"
      source: |
        from chatwoot import ChatwootClient

        client = ChatwootClient(
            base_url="https://app.chatwoot.com",
            api_token="your-api-token"
        )

        inboxes = client.contacts.contactable_inboxes(
            account_id=1,
            contact_id=100
        )

        for item in inboxes:
            print(item["source_id"], item["inbox"]["name"])
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/contactable_inboxes_response'
    '401':
      description: Authentication error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/bad_request_error'
    '422':
      description: Incorrect payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/bad_request_error'
