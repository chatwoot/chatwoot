tags:
  - AI External
operationId: ai-create-payment-link
summary: Create Payment Link (AI)
description: |
  Create a payment link from an AI agent context. The AI agent must be assigned to the conversation.
security:
  - alooStudioApiKey: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - conversation_id
          - amount
        properties:
          conversation_id:
            type: integer
            description: Conversation ID (actual or display ID)
          amount:
            type: number
            description: Payment amount (must be positive)
          currency:
            type: string
            description: Currency code (defaults to KWD)
          provider:
            type: string
            description: Payment provider
responses:
  '201':
    description: Payment link created
    content:
      application/json:
        schema:
          type: object
          properties:
            success:
              type: boolean
            payment_link:
              type: object
              properties:
                id:
                  type: integer
                external_payment_id:
                  type: string
                payment_url:
                  type: string
                amount:
                  type: number
                currency:
                  type: string
                provider:
                  type: string
                status:
                  type: string
                created_at:
                  type: string
            conversation_id:
              type: integer
            conversation_display_id:
              type: integer
            message:
              type: string
  '400':
    description: Missing required params or not assigned to AI agent
  '401':
    description: Unauthorized
  '404':
    description: Conversation not found
