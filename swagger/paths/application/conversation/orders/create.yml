tags:
  - Orders
operationId: create-conversation-order
summary: Create Order in Conversation
description: |
  Create an order within a conversation context. The order will be created with the specified products and a payment link will be sent in the conversation.
security:
  - userApiKey: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/conversation_order_create_payload'
responses:
  '200':
    description: Order created
    content:
      application/json:
        schema:
          type: object
          properties:
            success:
              type: boolean
            data:
              type: object
              properties:
                order_id:
                  type: integer
                external_payment_id:
                  type: string
                payment_url:
                  type: string
                subtotal:
                  type: number
                total:
                  type: number
                currency:
                  type: string
                status:
                  type: string
                items:
                  type: array
                  items:
                    type: object
  '401':
    description: Unauthorized
  '422':
    description: Validation error
