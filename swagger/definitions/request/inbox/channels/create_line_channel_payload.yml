type: object
title: LINE channel
required:
  - type
  - line_channel_id
  - line_channel_secret
  - line_channel_token
properties:
  type:
    type: string
    enum: ['line']
    example: line
  line_channel_id:
    type: string
    description: LINE channel ID
    example: '1234567890'
  line_channel_secret:
    type: string
    description: LINE channel secret
    example: line-channel-secret
  line_channel_token:
    type: string
    description: LINE channel access token
    example: line-channel-token
