type: object
title: WhatsApp channel
required:
  - type
  - phone_number
  - provider
  - provider_config
properties:
  type:
    type: string
    enum: ['whatsapp']
    example: whatsapp
  phone_number:
    type: string
    description: WhatsApp phone number
    example: '+15551234567'
  provider:
    type: string
    description: WhatsApp provider
    enum: ['default', 'whatsapp_cloud']
    example: whatsapp_cloud
  provider_config:
    type: object
    description: Provider-specific WhatsApp configuration
    required:
      - api_key
    properties:
      api_key:
        type: string
        description: WhatsApp provider API key
        example: your-api-key
      phone_number_id:
        type: string
        description: Phone number ID for WhatsApp Cloud
        example: your-phone-number-id
      business_account_id:
        type: string
        description: Business account ID for WhatsApp Cloud
        example: your-business-account-id
    example:
      api_key: your-api-key
      phone_number_id: your-phone-number-id
      business_account_id: your-business-account-id
