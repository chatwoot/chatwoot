type: object
title: WhatsApp channel
required:
  - type
properties:
  type:
    type: string
    enum: ['whatsapp']
    example: whatsapp
  phone_number:
    type: string
    description: WhatsApp phone number
    example: '+15551234567'
  provider:
    type: string
    description: WhatsApp provider
    enum: ['default', 'whatsapp_cloud']
    example: whatsapp_cloud
  provider_config:
    type: object
    description: Provider-specific WhatsApp configuration
    example:
      api_key: your-api-key
