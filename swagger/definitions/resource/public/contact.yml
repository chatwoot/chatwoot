type: object
properties:
  id:
    type: integer
    description: Id of the contact
  source_id:
    type: string
    description: The session identifier of the contact
  name:
    type: string
    description: Name of the contact
  email:
    type: string
    description: Email of the contact
  additional_emails:
    type: array
    description: Additional email addresses stored for the contact
    items:
      type: string
  email_addresses:
    type: array
    description: Stored email addresses for the contact, ordered with the primary email first
    items:
      type: string
  phone_number:
    type: string
    description: Phone number of the contact
  additional_phones:
    type: array
    description: Additional phone numbers stored for the contact
    items:
      type: string
  phone_numbers:
    type: array
    description: Stored phone numbers for the contact, ordered with the primary phone number first
    items:
      type: string
  pubsub_token:
    type: string
    description: The token to be used to connect to chatwoot websocket
