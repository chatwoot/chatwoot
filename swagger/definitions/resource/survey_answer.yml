type: object
properties:
  id:
    type: integer
    description: Survey answer ID
  question_text:
    type: string
    description: The text of the survey question
  question_type:
    type: string
    description: The type of question (text, single_select, multi_select)
    enum:
      - text
      - single_select
      - multi_select
  answer_text:
    type: string
    nullable: true
    description: The text answer (for text questions)
  selected_option:
    type: object
    nullable: true
    description: The selected option (for single_select/multi_select questions)
    properties:
      id:
        type: integer
        description: Option ID
      option_text:
        type: string
        description: Option text
  created_at:
    type: string
    format: date-time
    description: When the answer was created
