# ============================================================
#  Nexus – Docker Compose (Production)  —  VPS 1
# ============================================================
#  Conecta ao postgres, redis e minio da stack Infra via rede
#  igaralead_public. A stack Infra (docker-compose.core.yml)
#  deve estar rodando.
#
#  Uso (Portainer):
#    Deploy stack via Portainer → variáveis em stack.env
#  Uso (CLI):
#    cp .env.example stack.env && vi stack.env
#    docker compose -f docker-compose.production.yaml up -d
# ============================================================

services:
  base: &base
    image: ghcr.io/${GHCR_OWNER:-igaralead}/nexus:latest
    env_file:
      - path: stack.env
        required: false
    volumes:
      - storage_data:/app/storage

  rails:
    <<: *base
    container_name: nexus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: always
    networks:
      - igaralead_public

  sidekiq:
    <<: *base
    container_name: nexus-sidekiq
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: always
    networks:
      - igaralead_public

  baileys:
    image: ghcr.io/${GHCR_OWNER:-igaralead}/baileys-sidecar:latest
    container_name: nexus-baileys
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - baileys_sessions:/data/sessions
    environment:
      - PORT=3500
      - NEXUS_WEBHOOK_URL=http://rails:3000
      - BAILEYS_SIDECAR_API_KEY=${BAILEYS_SIDECAR_API_KEY}
      - LOG_LEVEL=info
      - SESSIONS_DIR=/data/sessions
    networks:
      - igaralead_public

volumes:
  storage_data:
  baileys_sessions:

networks:
  igaralead_public:
    external: true
