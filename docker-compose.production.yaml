services:
  base: &base
    image: chatwoot/chatwoot:latest
    env_file: .env ## Change this file for customized env variables
    volumes:
      - storage_data:/app/storage

  rails:
    <<: *base
    # depends_on removed - using external Redis
    network_mode: host  # Linux: Use host network to access local PostgreSQL and Redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      # With host network, use localhost to access host services
      - POSTGRES_HOST=${POSTGRES_HOST:-localhost}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '7000', '-b', '0.0.0.0']
    restart: always

  sidekiq:
    <<: *base
    # depends_on removed - using external Redis
    network_mode: host  # Linux: Use host network to access local PostgreSQL and Redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      # With host network, use localhost to access host services
      - POSTGRES_HOST=${POSTGRES_HOST:-localhost}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always

  # Commented out - using local database instead
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   restart: always
  #   ports:
  #     - '127.0.0.1:5432:5432'
