version: '3'

services:
  base: &base
    image: chatwoot/chatwoot:latest
    env_file: .env ## Change this file for customized env variables
    volumes:
      - storage_data:/app/storage

  rails:
    <<: *base
    depends_on:
      - redis
    ports:
      - '127.0.0.1:7000:7000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '7000', '-b', '0.0.0.0']
    restart: always
    # Linux: Use Docker bridge network gateway to access host database
    # Set POSTGRES_HOST=172.17.0.1 in .env file (or use host IP if different)
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Works on newer Docker versions
      # Alternative: If above doesn't work, use: "host.docker.internal:172.17.0.1"

  sidekiq:
    <<: *base
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always
    # Linux: Use Docker bridge network gateway to access host database
    # Set POSTGRES_HOST=172.17.0.1 in .env file (or use host IP if different)
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Works on newer Docker versions
      # Alternative: If above doesn't work, use: "host.docker.internal:172.17.0.1"

  # Commented out - using local database instead
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   restart: always
  #   ports:
  #     - '127.0.0.1:5432:5432'
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   environment:
  #     - POSTGRES_DB=chatwoot
  #     - POSTGRES_USER=postgres
  #     # Please provide your own password.
  #     - POSTGRES_PASSWORD=

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'

volumes:
  storage_data:
  # postgres_data:  # Not needed when using local database
  redis_data:
