# ============================================================
#  Nexus (Chatwoot) – Docker Compose (Production)
# ============================================================
#  Conecta ao postgres e redis da stack Infra via rede igaralead_public.
#  A stack Infra (docker-compose.core.yml ou full.yml) deve estar rodando.
#
#  Uso:
#    cp .env.example .env && vi .env
#    docker compose -f docker-compose.production.yaml up -d
# ============================================================

services:
  base: &base
    image: ghcr.io/${GHCR_OWNER:-igaralead}/nexus:latest
    env_file: .env
    volumes:
      - storage_data:/app/storage

  rails:
    <<: *base
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: always
    networks:
      - igaralead_public

  sidekiq:
    <<: *base
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: always
    networks:
      - igaralead_public

volumes:
  storage_data:

networks:
  igaralead_public:
    external: true
