version: '3'

services:
  base: &base
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        BUNDLE_WITHOUT: ''
        EXECJS_RUNTIME: 'Node'
        RAILS_ENV: 'development'
        RAILS_SERVE_STATIC_FILES: 'false'
    tty: true
    stdin_open: true
    image: chatwoot:development
    env_file: .env

  rails:
    <<: *base
    build:
      context: .
      dockerfile: ./docker/dockerfiles/rails.Dockerfile
    image: chatwoot-rails:development
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - postgres
      - redis
      - vite
      - mailhog
      - sidekiq
    ports:
      - 3000:3000
    env_file: .env
    environment:
      - VITE_DEV_SERVER_HOST=vite
      - NODE_ENV=development
      - RAILS_ENV=development
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]

  sidekiq:
    <<: *base
    image: chatwoot-rails:development
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - postgres
      - redis
      - mailhog
    environment:
      - NODE_ENV=development
      - RAILS_ENV=development
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  vite:
    <<: *base
    build:
      context: .
      dockerfile: ./docker/dockerfiles/vite.Dockerfile
    image: chatwoot-vite:development
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    ports:
      - "3036:3036" # Vite dev server
    environment:
      - VITE_DEV_SERVER_HOST=0.0.0.0
      - NODE_ENV=development
      - RAILS_ENV=development
    entrypoint: docker/entrypoints/vite.sh
    command: bin/vite dev

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - '5432:5432'
    volumes:
      - postgres:/data/postgres
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis:/data/redis
    ports:
      - '6379:6379'

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025

  evolution_api:
    container_name: evolution_api
    image: ${EVOLUTION_API_IMAGE:-evoapicloud/evolution-api:latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "${EVOLUTION_BIND_ADDRESS:-127.0.0.1}:${EVOLUTION_API_PORT:-8080}:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      CORS_ORIGIN: ${EVOLUTION_CORS_ORIGIN:-*}
      CORS_METHODS: ${EVOLUTION_CORS_METHODS:-GET,POST,PUT,DELETE}
      CORS_CREDENTIALS: ${EVOLUTION_CORS_CREDENTIALS:-true}

      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: ${AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES:-false}

      DATABASE_PROVIDER: ${EVOLUTION_DATABASE_PROVIDER:-postgresql}
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_CONNECTION_URI:-postgresql://postgres:postgres@postgres:5432/chatwoot?schema=evolution_api}
      DATABASE_CONNECTION_CLIENT_NAME: ${EVOLUTION_DATABASE_CONNECTION_CLIENT_NAME:-evolution_chatwoot}
      DATABASE_SAVE_DATA_INSTANCE: ${EVOLUTION_DATABASE_SAVE_DATA_INSTANCE:-true}
      DATABASE_SAVE_DATA_NEW_MESSAGE: ${EVOLUTION_DATABASE_SAVE_DATA_NEW_MESSAGE:-true}
      DATABASE_SAVE_MESSAGE_UPDATE: ${EVOLUTION_DATABASE_SAVE_MESSAGE_UPDATE:-true}
      DATABASE_SAVE_DATA_CONTACTS: ${EVOLUTION_DATABASE_SAVE_DATA_CONTACTS:-true}
      DATABASE_SAVE_DATA_CHATS: ${EVOLUTION_DATABASE_SAVE_DATA_CHATS:-true}
      DATABASE_SAVE_DATA_LABELS: ${EVOLUTION_DATABASE_SAVE_DATA_LABELS:-true}
      DATABASE_SAVE_DATA_HISTORIC: ${EVOLUTION_DATABASE_SAVE_DATA_HISTORIC:-true}

      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: ${EVOLUTION_CACHE_REDIS_URI:-redis://:${REDIS_PASSWORD:-devredis}@redis:6379/6}
      CACHE_REDIS_PREFIX_KEY: ${EVOLUTION_CACHE_REDIS_PREFIX_KEY:-evolution_chatwoot}
      CACHE_REDIS_SAVE_INSTANCES: ${EVOLUTION_CACHE_REDIS_SAVE_INSTANCES:-true}
      CACHE_LOCAL_ENABLED: ${EVOLUTION_CACHE_LOCAL_ENABLED:-false}

      DEL_INSTANCE: ${EVOLUTION_DEL_INSTANCE:-false}
      LOG_LEVEL: ${EVOLUTION_LOG_LEVEL:-ERROR,WARN,INFO}
      QRCODE_COLOR: "#${EVOLUTION_QRCODE_COLOR:-000000}"

      CHATWOOT_ENABLED: true
      CHATWOOT_MESSAGE_READ: ${EVOLUTION_CHATWOOT_MESSAGE_READ:-true}
      CHATWOOT_MESSAGE_DELETE: ${EVOLUTION_CHATWOOT_MESSAGE_DELETE:-true}
      CHATWOOT_IMPORT_PLACEHOLDER_MEDIA_MESSAGE: ${EVOLUTION_CHATWOOT_IMPORT_PLACEHOLDER_MEDIA_MESSAGE:-true}
      CHATWOOT_IMPORT_DATABASE_CONNECTION_URI: ${CHATWOOT_IMPORT_DATABASE_CONNECTION_URI:-postgresql://postgres:postgres@postgres:5432/chatwoot?sslmode=disable}
    expose:
      - "8080"

  evolution_frontend:
    container_name: evolution_frontend
    image: ${EVOLUTION_FRONTEND_IMAGE:-evoapicloud/evolution-manager:latest}
    restart: unless-stopped
    depends_on:
      - evolution_api
    ports:
      - "${EVOLUTION_FRONTEND_BIND_ADDRESS:-127.0.0.1}:${EVOLUTION_FRONTEND_PORT:-3003}:80"
    volumes:
      - ./nginx.evolution-manager.conf:/etc/nginx/conf.d/nginx.conf:ro

volumes:
  postgres:
  redis:
  packs:
  node_modules:
  cache:
  bundle:
  evolution_instances:
