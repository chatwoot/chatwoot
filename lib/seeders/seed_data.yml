portals:
  - name: 'Paperlayer Help Center'
    slug: 'paperlayer-help'
    page_title: 'Paperlayer - Help & Support'
    header_text: 'How can we help you with your paper needs?'
    color: '#0066CC'
    config:
      allowed_locales: ['en']
      default_locale: 'en'
    categories:
      - name: 'Getting Started'
        slug: 'getting-started'
        description: 'Learn the basics of ordering from Paperlayer'
        locale: 'en'
        position: 1
        articles:
          - title: 'How to Place Your First Order'
            author: 'sarah@paperlayer.com'
            description: 'Step-by-step guide to placing your first paper order'
            status: 'published'
            locale: 'en'
            content: |
              # How to Place Your First Order

              Welcome to Paperlayer! We're excited to help you with your paper needs.

              ## Step 1: Browse Our Products
              Visit our product catalog to explore our wide range:
              - Copy Paper (20lb, 24lb, 28lb, 32lb)
              - Cardstock (65lb, 80lb, 110lb)
              - Specialty Papers (colored, glossy, recycled)

              ## Step 2: Request a Quote
              Contact our sales team via:
              - Live chat on our website
              - Email: sales@paperlayer.com
              - Phone: 1-800-PAPER-01

              ## Step 3: Review and Approve
              Our team will send you a detailed quote within 24 hours.

              ## Step 4: Place Your Order
              Once approved, we'll process your order and provide tracking.

              ## Step 5: Delivery
              - Standard: 2-3 business days (FREE over $100)
              - Same-day: Available for local orders before noon

          - title: 'Understanding Paper Weights'
            author: 'sarah@paperlayer.com'
            description: 'Learn about different paper weights and their best uses'
            status: 'published'
            locale: 'en'
            content: |
              # Understanding Paper Weights

              Paper weight can be confusing. Let us help you choose the right weight.

              ## Copy Paper Weights

              ### 20lb (75 gsm) - Standard
              - Most common for everyday printing
              - Great for internal documents
              - Economical for high-volume

              ### 24lb (90 gsm) - Premium
              - Heavier feel, more professional
              - Ideal for presentations, resumes
              - Less see-through than 20lb

              ### 28lb (105 gsm) - Super Premium
              - Excellent for important documents
              - Professional brochures
              - High-quality letterhead

              ### 32lb (120 gsm) - Ultra Premium
              - Luxury feel and appearance
              - Executive communications
              - Certificates and awards

              ## Cardstock Weights

              ### 65lb (176 gsm) - Light
              - Greeting cards, postcards

              ### 80lb (216 gsm) - Medium
              - Business cards, invitations

              ### 110lb (298 gsm) - Heavy
              - Premium business cards
              - High-end invitations

      - name: 'Products & Pricing'
        slug: 'products-pricing'
        description: 'Information about our paper products and pricing'
        locale: 'en'
        position: 2
        articles:
          - title: 'Copy Paper Product Line'
            author: 'marcus@paperlayer.com'
            description: 'Complete guide to our copy paper offerings'
            status: 'published'
            locale: 'en'
            content: |
              # Copy Paper Product Line

              Paperlayer offers premium paper products for your business.

              ## Standard Copy Paper
              **Premium White - 20lb**
              - Price: $45 per case (10 reams)
              - Brightness: 92
              - Size: 8.5" x 11"
              - Sheets: 500 per ream

              **Premium White - 24lb**
              - Price: $52 per case
              - Brightness: 94
              - More professional feel

              ## Premium Copy Paper
              **Ultra White - 28lb**
              - Price: $65 per case
              - Brightness: 96
              - Perfect for presentations

              **Executive White - 32lb**
              - Price: $78 per case
              - Brightness: 98
              - Luxury weight

              ## Recycled Paper
              **Eco-Friendly - 20lb**
              - Price: $48 per case
              - 30% post-consumer content
              - FSC certified

              ## Volume Discounts
              - 50-99 cases: 10% off
              - 100-249 cases: 15% off
              - 250+ cases: 20% off

          - title: 'Bulk Order Discounts'
            author: 'emily@paperlayer.com'
            description: 'Learn about our volume pricing tiers'
            status: 'published'
            locale: 'en'
            content: |
              # Bulk Order Discounts

              The more you order, the more you save!

              ## Discount Tiers

              ### Tier 1: 50-99 Cases
              - **10% discount**
              - Perfect for medium offices

              ### Tier 2: 100-249 Cases
              - **15% discount**
              - Dedicated account manager
              - Quarterly supply option

              ### Tier 3: 250+ Cases
              - **20% discount**
              - Priority customer service
              - Free delivery
              - Flexible payment terms

              ## Example Savings
              **100 cases of Premium White 20lb**
              - Regular: $4,500
              - With 15% discount: $3,825
              - **You save: $675!**

      - name: 'Shipping & Delivery'
        slug: 'shipping-delivery'
        description: 'Delivery options and tracking information'
        locale: 'en'
        position: 3
        articles:
          - title: 'Delivery Options & Times'
            author: 'tom@paperlayer.com'
            description: 'Choose the delivery option that works for you'
            status: 'published'
            locale: 'en'
            content: |
              # Delivery Options & Times

              ## Standard Delivery (FREE)
              - **Timeframe:** 2-3 business days
              - **Cost:** FREE over $100
              - **Coverage:** Within 200 miles

              ## Express Delivery
              - **Timeframe:** Next business day
              - **Cost:** $25 flat fee
              - **Cutoff:** Order by 3 PM

              ## Same-Day Delivery
              - **Timeframe:** Within 6 hours
              - **Cost:** $50 flat fee
              - **Coverage:** Within 50 miles
              - **Cutoff:** Order by 12 PM noon

              ## Tracking
              All orders include:
              - Real-time tracking number
              - Email notifications
              - Delivery confirmation

captain_assistants:
  - name: 'Paper Expert'
    description: 'AI assistant specialized in helping customers with all their paper product needs'
    config:
      temperature: 0.7
      feature_faq: true
      feature_memory: true
      product_name: 'Paperlayer Paper Products'
    scenarios:
      - title: 'Product Recommendations'
        description: 'Help customers choose the right paper products'
        enabled: true
        instruction: |
          When a customer asks about which paper to use, ask clarifying questions:
          1. What will they use it for? (everyday printing, presentations, letterhead, etc.)
          2. What's their volume?
          3. Any special requirements? (recycled, brightness, specific sizes)

          Then recommend appropriate products:
          - 20lb for everyday use
          - 24lb for professional documents
          - 28lb for presentations
          - 32lb for executive communications
          - Cardstock for business cards

          Always mention relevant discounts and offer to connect with sales for quotes.

      - title: 'Bulk Order Processing'
        description: 'Guide customers through bulk order process'
        enabled: true
        instruction: |
          For bulk order inquiries:
          1. Determine their quantity needs
          2. Explain discount tiers: 10% (50-99), 15% (100-249), 20% (250+)
          3. Calculate estimated savings
          4. Explain benefits (account manager, flexible terms)
          5. Offer to connect with bulk sales team
          6. Add the 'bulk-order' label

      - title: 'Shipping Questions'
        description: 'Answer delivery and shipping questions'
        enabled: true
        instruction: |
          When customers ask about shipping:
          1. Standard: 2-3 days (FREE over $100)
          2. Express: Next day ($25)
          3. Same-day: 6 hours, order by noon ($50)
          4. Bulk freight: 3-5 days for 100+ cases

          Mention tracking is included.
          For urgent needs, emphasize same-day delivery within 50 miles.

    documents:
      - name: 'General FAQs'
        external_link: 'https://paperlayer.com/faq/general'
        status: 'available'
        content: |
          # Frequently Asked Questions

          ## What are your business hours?
          Monday-Friday: 8 AM - 6 PM EST
          Saturday: 9 AM - 2 PM EST
          Sunday: Closed

          ## Do you offer free shipping?
          Yes! Free standard shipping on orders over $100 within 200 miles.

          ## What payment methods do you accept?
          - Credit cards (Visa, MC, AmEx, Discover)
          - Purchase orders (established accounts)
          - ACH/Wire transfer
          - Net 30 terms (qualified businesses)

          ## Can I return paper products?
          Yes, unopened reams can be returned within 30 days.

          ## What makes Paperlayer different?
          - Expert advice on paper selection
          - Personal service from dedicated account managers
          - Local delivery and same-day service
          - Competitive pricing with volume discounts

      - name: 'Product Specifications'
        external_link: 'https://paperlayer.com/faq/products'
        status: 'available'
        content: |
          # Product Specifications FAQs

          ## What does paper brightness mean?
          Brightness is measured 0-100. Higher = whiter, brighter.
          - 92: Standard brightness
          - 94-96: Premium brightness
          - 98+: Ultra-premium brightness

          ## What's the difference between 20lb and 24lb?
          The number refers to the weight of 500 sheets.
          - 20lb: Standard, economical
          - 24lb: Heavier, more professional
          - 28lb: Premium for presentations
          - 32lb: Luxury for executive use

          ## Is your paper acid-free?
          Yes, all our copy paper is acid-free for archival quality.

          ## Do you carry recycled paper?
          Yes! Our Eco-Friendly line: 30% post-consumer recycled, FSC certified.

          ## What sizes do you offer?
          - Letter: 8.5" x 11" (most common)
          - Legal: 8.5" x 14"
          - Tabloid: 11" x 17"
          - Custom sizes for bulk orders

          ## Can I get colored paper?
          Yes! Pastels: Ivory, Pink, Blue, Green, Yellow
          Brights: Red, Orange, Purple
          Custom colors for bulk orders

      - name: 'Bulk Ordering Guide'
        external_link: 'https://paperlayer.com/guides/bulk-orders'
        status: 'available'
        content: |
          # Bulk Ordering Guide

          ## Benefits of Bulk Orders

          ### Cost Savings
          - 50-99 cases: Save 10%
          - 100-249 cases: Save 15%
          - 250+ cases: Save 20%

          ### Additional Perks
          - Dedicated account manager
          - Priority customer service
          - Flexible payment terms (Net 30/60/90)
          - Free delivery on orders over 100 cases
          - Scheduled recurring deliveries

          ## How to Place a Bulk Order

          1. Contact our bulk sales team
             - Email: bulk@paperlayer.com
             - Phone: 1-800-BULK-PAPER

          2. Discuss your needs
             - Types of paper needed
             - Estimated volume
             - Delivery schedule

          3. Receive custom quote within 24 hours

          4. Review and sign agreement
             - No long-term contracts required
             - Flexible terms available

          ## Storage Tips
          - Store in cool, dry place (60-70°F)
          - Keep away from direct sunlight
          - Maintain 40-60% humidity
          - Store flat, not on edge

