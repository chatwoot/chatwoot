canned_responses:
  - short_code: 'welcome'
    content: 'Thank you for contacting Paperlayer! We''re committed to providing the highest quality paper products for your business. How can I help you today?'
  - short_code: 'bulk'
    content: 'For bulk orders over 100 reams, we offer competitive wholesale pricing. Let me get you a custom quote. Could you share your estimated monthly paper needs?'
  - short_code: 'pricing'
    content: 'Our standard pricing for premium white copy paper (20lb, 8.5x11) is $45 per case (10 reams). We offer volume discounts: 10% off for 50-99 cases, 15% off for 100-249 cases, and 20% off for 250+ cases.'
  - short_code: 'delivery'
    content: 'We offer same-day delivery for local orders (within 50 miles) placed before noon, and 2-3 business days for standard shipping. Rush delivery is available for an additional fee.'
  - short_code: 'custom'
    content: 'We provide custom letterhead printing services with a minimum order of 5 reams. Typical turnaround is 5-7 business days. Would you like to discuss your design requirements?'
  - short_code: 'stock'
    content: 'We carry a full range of paper products: copy paper (20lb-32lb), cardstock (65lb-110lb), colored paper, glossy photo paper, and specialty papers. What type are you interested in?'
  - short_code: 'closing'
    content: 'Thank you for choosing Paperlayer! Is there anything else I can help you with today?'
  - short_code: 'followup'
    content: 'I wanted to follow up on your recent inquiry. Have you had a chance to review our quote?'
  - short_code: 'tracking'
    content: 'I can help you track your order. Could you please provide your order number?'
  - short_code: 'samples'
    content: 'We''d be happy to send you paper samples! What types of paper are you interested in testing?'
  - short_code: 'weights'
    content: '20lb is our standard weight for everyday printing. 24lb is heavier and more professional. 28lb is perfect for presentations. 32lb is our premium weight for executive communications.'
  - short_code: 'discounts'
    content: 'We offer tiered volume discounts: 50-99 cases (10% off), 100-249 cases (15% off), 250+ cases (20% off). Plus, you get a dedicated account manager with orders over 100 cases!'
  - short_code: 'rush'
    content: 'We can expedite your order! Same-day delivery is available for orders placed before noon within 50 miles. Express next-day delivery is also available. Additional fees apply.'
  - short_code: 'recycled'
    content: 'Yes! Our Eco-Friendly line features 30% post-consumer recycled content and is FSC certified. It''s only $3 more per case than standard paper - great for sustainability!'
  - short_code: 'colors'
    content: 'We stock pastels (Ivory, Pink, Blue, Green, Yellow) and brights (Red, Orange, Purple). Custom colors are available for bulk orders. What are you looking for?'

